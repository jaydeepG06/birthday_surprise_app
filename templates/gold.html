<!DOCTYPE html>
<html>
<head>

<style>

body{
margin:0;
background:#0d0d0d;
font-family:Arial;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

/* MAIN FRAME */

.frame{

position:relative;

width:90%;
height:90vh;

border-radius:25px;

overflow:hidden;

box-shadow:
0 0 40px rgba(255,255,255,0.2);

border:3px solid rgba(255,255,255,0.15);

}

/* VIDEO */

video{

width:100%;
height:100%;

object-fit:contain;

}

/* ENVELOPE */

.envelope{

position:absolute;

top:20px;
right:20px;

font-size:40px;

cursor:pointer;

z-index:20;

transition:0.3s;

}

.envelope:hover{

transform:scale(1.15);

}

/* LETTER */

.letter-popup{

display:none;

position:absolute;

top:50%;
left:50%;

transform:translate(-50%,-50%);

background:#fff8dc;

padding:35px;

width:60%;

border-radius:20px;

z-index:30;

box-shadow:0 0 30px rgba(0,0,0,0.6);

animation:popup 0.4s ease;

}

/* LETTER TEXT */

.letter-text{

font-size:22px;

line-height:1.7;

text-align:center;

color:#4b2e05;

}

/* BUTTON */

.close-btn{

margin-top:20px;

padding:10px 20px;

border:none;

border-radius:10px;

cursor:pointer;

}

/* FINAL BUTTON */

.breeze-btn{

position:absolute;

bottom:25px;

left:50%;

transform:translateX(-50%);

padding:15px 25px;

font-size:18px;

border:none;

border-radius:12px;

cursor:pointer;

z-index:20;

}

/* POPUP */

@keyframes popup{

from{
opacity:0;
transform:translate(-50%,-40%) scale(0.8);
}

to{
opacity:1;
transform:translate(-50%,-50%) scale(1);
}

}

</style>

</head>

<body>

<div class="frame">

<!-- VIDEO -->

<video autoplay loop muted playsinline>

<source src="/static/video/gold.mp4"
type="video/mp4">

</video>

<!-- ENVELOPE -->

<div class="envelope"
onclick="openLetter()">

💌

</div>

<!-- LETTER -->

<div class="letter-popup" id="letter">

<div class="letter-text">

HAPPY BIRTHDAY MY LOVE ❤️ <br><br>

I genuinely wish I could give you every beautiful thing
you've ever dreamt of.

You are one of the best things that ever happened to me,
and I’ll always cherish every moment with you 🌸

</div>

<center>

<button class="close-btn"
onclick="closeLetter()">

Close 💕

</button>

</center>

</div>

<!-- FINAL BUTTON -->

<button class="breeze-btn"
onclick="location.href='/final'">

lets go around and feel the breeze 🌙

</button>

</div>

<script>

function openLetter(){

document.getElementById("letter").style.display =
"block";

}

function closeLetter(){

document.getElementById("letter").style.display =
"none";

}

</script>

</body>
</html>
