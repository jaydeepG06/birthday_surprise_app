<!DOCTYPE html>
<html>
<head>

<style>

body{
margin:0;
overflow:hidden;
background:black;
font-family:Arial;
}

/* VIDEO */
video{

position:fixed;

width:90%;
height:90vh;

object-fit:contain;

/* SLOW CINEMATIC ZOOM */
animation:zoomIn 10s ease-in-out forwards;

}

/* QUOTE */
.quote{

position:absolute;

bottom:60px;

width:100%;

text-align:center;

font-size:28px;

color:white;

text-shadow:2px 2px 10px black;

padding:20px;

line-height:1.6;

animation:fadeIn 3s ease;

}

/* ANIMATIONS */

@keyframes fadeIn{

from{
opacity:0;
transform:translateY(20px);
}

to{
opacity:1;
transform:translateY(0);
}

}

@keyframes zoomIn{

from{
transform:scale(1);
}

to{
transform:scale(1.15);
}

}

</style>

</head>

<body>

<!-- BACKGROUND MUSIC -->
<audio autoplay loop>

<source src="/static/audio/music.mp3"
type="audio/mp3">

</audio>

<!-- VIDEO -->
<video autoplay muted>

<source src="/static/video/river.mp4"
type="video/mp4">

</video>

<!-- QUOTE -->
<div class="quote">

this exactly how i want to celebrate
all your birthdays for the rest of our life ❤️ <br><br>

I loveeeee youuuuuu 🌙 <br><br>

happpyyy birthday once again 🎂✨

</div>

</body>
</html>
