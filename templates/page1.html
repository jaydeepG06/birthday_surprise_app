<!DOCTYPE html>
<html>
<head>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    background: url("/static/images/parchment.png") no-repeat center;
    background-size: cover;
    height: 100vh;
    font-family: 'Playfair Display', serif;
}

/* TEXT */
.text-box {
    position: absolute;
    top: 25%;
    width: 100%;
    text-align: center;
    font-size: 28px;
    color: #4b2e05;
    animation: fadeIn 2s ease-in;
}

/* BUTTONS */
.buttons {
    position: absolute;
    bottom: 80px;
    width: 100%;
    text-align: center;
}

button {
    padding: 12px 30px;
    margin: 15px;
    font-size: 18px;
    border-radius: 25px;
    border: none;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.1);
}

/* ANIMATION */
@keyframes fadeIn {
    from {opacity: 0; transform: translateY(20px);}
    to {opacity: 1;}
}
</style>

</head>

<body>

<div class="text-box">
Hey my love 💫 <br><br>
Please accept my invitation <br>
for a virtual birthday night date ❤️
</div>

<div class="buttons">
    <button onclick="location.href='/main'">Let's go 😍</button>
    <button onclick="location.href='/page2'">Ammi nhi manegi 😅</button>
</div>

</body>
</html>
